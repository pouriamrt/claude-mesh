# Publish release artifacts on v*.*.* tags.
#
# Currently GHCR-only: we push docker/Dockerfile.relay to GitHub Container
# Registry as `ghcr.io/<owner>/claude-mesh/relay:<tag>` plus `:latest`.
#
# npm publishing for @claude-mesh/peer-agent is intentionally not wired:
# both workspace packages are `"private": true`, and peer-agent's
# dependency on `@claude-mesh/shared` uses the `workspace:*` protocol,
# which needs `@claude-mesh/shared` published first and pnpm's
# `inject-workspace-packages` plumbing. Revisit once the public API
# stabilizes and we want peer-agent consumable as a library.
name: Publish
on:
  push:
    tags: ["v*.*.*"]

jobs:
  ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.relay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/relay:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/relay:latest
